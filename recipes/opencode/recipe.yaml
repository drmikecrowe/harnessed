# Recipe: opencode — the opencode (sst/opencode) base recipe (design §8/§11).
#
# Contract-only, like recipes/omp: it contributes NO MCP servers / skills / commands of its own.
# It documents the opencode harness runtime contract so an opencode stack can reference it
# explicitly:
#
#   - opencode consumes the SAME Claude-canonical profile (.claude/) as claude/omp — it reads
#     .claude/skills/**/SKILL.md and ~/.claude/CLAUDE.md natively (design §8: single source of
#     truth). No re-authoring.
#   - opencode does NOT read .claude/.mcp.json; MCP is wired by the harnessed-opencode IMAGE, which
#     bakes ~/.config/opencode/opencode.json pointing at the hatago hub
#     (http://localhost:3535/mcp). The recipe DOCUMENTS this; it bakes nothing itself.
#   - Caveat (sst/opencode): .claude/commands and .claude/agents are NOT consumed by opencode —
#     only skills + CLAUDE.md/AGENTS.md port directly. A recipe targeting opencode should ship
#     capabilities as skills (or native .opencode assets), not Claude commands/agents.
name: opencode
description: opencode base — consume the Claude-canonical .claude/ skills; reach hatago via the image-baked opencode MCP config.
