# Recipe: gemini — the gemini-cli (Google) base recipe (design §8/§11).
#
# Contract-only, like recipes/omp and recipes/opencode: it contributes NO MCP servers / skills /
# commands of its own. It documents the gemini harness runtime contract so a gemini stack can
# reference it explicitly:
#
#   - gemini reaches the hatago hub via the harnessed-gemini IMAGE, which bakes
#     ~/.gemini/settings.json with one remote (Streamable-HTTP) MCP server pointing at the hub
#     (http://localhost:3535/mcp). gemini does NOT read the profile's .claude/.mcp.json.
#   - The committed Claude-canonical profile (.claude/) is still mounted for parity, but gemini does
#     NOT natively consume Claude skills/commands/agents (its native assets differ — gemini reads
#     GEMINI.md + its own command/extension format). A recipe targeting gemini should expose
#     capabilities as MCP servers (through hatago), not Claude skills/commands.
name: gemini
description: gemini-cli base — reach hatago via the image-baked ~/.gemini/settings.json MCP config.
