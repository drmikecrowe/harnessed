# Recipe: codex — the OpenAI Codex CLI base recipe (design §8/§11).
#
# Contract-only, like recipes/omp / recipes/opencode / recipes/gemini / recipes/antigravity: it
# contributes NO MCP servers / skills / commands of its own. It documents the codex harness runtime
# contract so a codex stack can reference it explicitly:
#
#   - codex reaches the hatago hub via the harnessed-codex IMAGE, which bakes ~/.codex/config.toml
#     with one remote MCP server ([mcp_servers.hatago] url → http://localhost:3535/mcp). codex 0.139+
#     supports remote Streamable-HTTP MCP natively (no stdio bridge). codex does NOT read the
#     profile's .claude/.mcp.json.
#   - The committed Claude-canonical profile (.claude/) is still mounted for parity, but codex does
#     NOT natively consume Claude skills/commands/agents — it reads AGENTS.md + its own
#     ~/.codex/prompts format. A recipe targeting codex should expose capabilities as MCP servers
#     (through hatago), not Claude skills/commands.
name: codex
description: OpenAI Codex base — reach hatago via the image-baked ~/.codex/config.toml MCP config.
