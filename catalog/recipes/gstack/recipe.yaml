# Recipe: gstack — install a third-party skill suite by running its own upstream installer.
#
# The whole recipe is: do what gstack's install docs say (git clone + ./setup), in a Dockerfile.
# ./setup bakes ~50 skills into ~/.claude/skills. The assembler can't see what a Dockerfile RUN
# step installs, so `expect:` lists a representative few for the capability test to probe.
name: gstack
description: Garry Tan's gstack skill suite (browser automation, design, PDF, …) installed via its upstream ./setup.

# What the capability test must find in the running container after a successful build. gstack
# installs many skills into ~/.claude/skills (and no ~/.claude/commands); declare a stable few.
expect:
  skills: [gstack, browse, make-pdf]
