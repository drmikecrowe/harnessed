# Stack: opencode-time — the opencode proof stack (plan 04-03 / HRN-02, design §8/§11).
#
# The SAME Claude-canonical `time` recipe (one stdio MCP server + one skill) run on the opencode
# harness, plus the `opencode` base recipe that DOCUMENTS the harness contract (it contributes no
# profile files of its own). Proves an opencode stack runs the identical profile a claude/omp stack
# would — no re-authoring (design §8: single source of truth): opencode reads .claude/skills
# natively and reaches the `time` server through the hatago hub via its image-baked
# ~/.config/opencode MCP config. The capability test renders its report (the hatago
# `hatago://servers` + mounted-profile checks are harness-independent; the opencode -p backstop is
# the rare fallback).
#
# Only opencode-stack fields are exercised; `services`, `permissions`, and `state` use defaults and
# are parsed forward by the assembler (D-14).
name: opencode-time
harness: opencode     # claude | omp | opencode  (exactly one)
recipes: [time, opencode]
