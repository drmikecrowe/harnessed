# Stack: gemini-time — the gemini proof stack (plan 04-03 / HRN-03, design §8/§11).
#
# The SAME Claude-canonical `time` recipe (one stdio MCP server + one skill) run on the gemini
# harness, plus the `gemini` base recipe that DOCUMENTS the harness contract (it contributes no
# profile files of its own). Proves a gemini stack reaches the `time` server through the hatago hub
# via its image-baked ~/.gemini/settings.json MCP config. The capability test renders its report
# (the hatago `hatago://servers` MCP check + mounted-profile filesystem checks are
# harness-independent; the `gemini -p` backstop is the rare fallback). Note: gemini does not
# natively consume the profile's Claude skill — the skill shows as present (profile mounted) but
# gemini's real capability here is the MCP `time` server via hatago.
#
# Only gemini-stack fields are exercised; `services`, `permissions`, and `state` use defaults and are
# parsed forward by the assembler (D-14).
name: gemini-time
harness: gemini       # claude | omp | opencode | gemini | antigravity  (exactly one)
recipes: [time, gemini]
