# Stack: omp-time — the omp proof stack (plan 04-03 / HRN-01, design §8/§11).
#
# The SAME Claude-canonical `time` recipe (one stdio MCP server + one skill) consumed by the omp
# harness via the pre-installed claude-hooks-bridge, plus the `omp` base recipe that DECLARES the
# bridge extension dependency (the bridge itself is baked into the harnessed-omp IMAGE — the recipe
# only documents the contract; it contributes no profile files of its own). Proves an omp stack
# runs the identical profile a claude stack would — no re-authoring (design §8: single source of
# truth) — and the harness-aware capability test renders its report (omp -p --mode json backstop;
# the hatago `hatago://servers` + mounted-profile checks are harness-independent).
#
# Only omp-stack fields are exercised; `services`, `permissions`, and `state` use defaults and are
# parsed forward by the assembler (D-14).
name: omp-time
harness: omp          # claude | omp  (exactly one)
recipes: [time, omp]
