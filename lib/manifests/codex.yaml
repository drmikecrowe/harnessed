# lib/manifests/codex.yaml — per-harness mount manifest for the codex harness.
#
# Source: CONTEXT.md D-01, D-02, D-03.
#
# profile_files: filenames listed for consistency with other manifests.
#   gemini/codex profile files are baked in image; the launcher skips the mount
