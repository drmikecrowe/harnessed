# lib/manifests/claude.yaml — per-harness mount manifest for the claude harness.
#
# Source: CONTEXT.md D-01 (YAML per harness), D-02 (profile_files + history_dirs only),
# D-03 (filenames only; launcher derives container target paths), D-05 (all five subdirs enabled).
#
# profile_files: filenames to mount ro from profiles/<stack>/ into the container.
# history_dirs:  $HOME-relative paths to rw-mount for history surfacing (MNT2-03).
#
# NEVER list in this file: agent.db, .credentials.json, or any auth credential path.

profile_files:
  - .mcp.json
  - settings.json

history_dirs:
  - .claude/projects     # per-project slug subdirs; slug aligned by path mirroring (D-06)
  - .claude/file-history
  - .claude/tasks
  - .claude/session-env
  - .claude/todos
