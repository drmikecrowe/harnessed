# lib/manifests/antigravity.yaml — per-harness mount manifest for the antigravity harness.
#
# Source: CONTEXT.md D-01, D-02, D-03.
#
# profile_files: filenames to mount ro from profiles/<stack>/ into the container.
#   Note: gemini/antigravity/codex profile files are baked in image; the launcher
#   skips the mount per D-03 / Pitfall 4 in 09-RESEARCH.md. Files are listed here
#   for consistency; harnessed_manifest_mounts() branches on harness and skips them.
#
# history_dirs: antigravity nests ALL history under ~/.gemini/antigravity-cli/ (MNT2-05).
#   NEVER mount the parent ~/.gemini/ — it contains gemini-cli OAuth credentials
#   (oauth_creds.json) and is a different tool's home (Pitfall 6 in 09-RESEARCH.md).
#   Mount only the three specific named subdirs.
#
# NEVER include credential files or the parent ~/.gemini/ dir — those hold OAuth tokens.

profile_files:
  - .mcp.json
  - settings.json

history_dirs:
  - .gemini/antigravity-cli/conversations
  - .gemini/antigravity-cli/brain
  - .gemini/antigravity-cli/implicit
